<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surabaya & Gresik dibawah 1M</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Lelang Surabaya & Gresik</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Cari Property">
            <select id="filterDropdown">
                <option value="semua">Semua Kategori</option>
                <option value="Rumah">🏠 Rumah</option>
                <option value="Apartemen">🏢 Apartemen</option>
                <option value="Tanah">🌳 Tanah</option>
                <option value="Gudang">🏬 Gudang</option>
                <option value="Ruko">🏪 Ruko</option>
                <option value="Pabrik">🏭 Pabrik</option>
                <option value="Rumah Usaha">🏪 Rumah Usaha</option>
                <option value="Rumah Hitung Tanah">🏚️ Rumah Hitung Tanah</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="gallery" id="gallery">
            <div class="photo-card" data-name="Rumah">
                <img src="lelang-Surabaya-&-gresik-dibawah-1M.jpeg" alt="Rumah" />
                <div class="info">Rumah</div>
            </div>
            <div class="photo-card" data-name="Rumah">
                <img src="lelang-surabaya-&-Gresik-dibawah-1M (3).jpeg" alt="Rumah" />
                <div class="info">Rumah</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>


</html>
