<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawa 10M keatas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Lelang Jawa</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Cari Property">
            <select id="filterDropdown">
                <option value="semua">Semua Kategori</option>
                <option value="Rumah">🏠 Rumah</option>
                <option value="Apartemen">🏢 Apartemen</option>
                <option value="Tanah">🌳 Tanah</option>
                <option value="Gudang">🏬 Gudang</option>
                <option value="Ruko">🏪 Ruko</option>
                <option value="Pabrik">🏭 Pabrik</option>
                <option value="Rumah Usaha">🏪 Rumah Usaha</option>
                <option value="Rumah Hitung Tanah">🏚️ Rumah Hitung Tanah</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="gallery" id="gallery">
            <div class="photo-card" data-name="Rumah">
                <img src="lelang-jawa-10M-keatas (1).jpeg" alt="Rumah">
                <div class="info">Rumah</div>
            </div>
            <div class="photo-card" data-name="Rumah">
                <img src="lelang-jawa-10M-keatas (2).jpeg" alt="Rumah">
                <div class="info">Rumah</div>
            </div>
            <div class="photo-card" data-name="Ruko">
                <img src="lelang-jawa-10M-keatas (3).jpeg" alt="Ruko">
                <div class="info">Ruko</div>
            </div>
            <div class="photo-card" data-name="Gudang">
                <img src="lelang-jawa-10M-keatas (4).jpeg" alt="Gudang">
                <div class="info">Gudang</div>
            </div>
            <div class="photo-card" data-name="Apartemen">
                <img src="lelang-jawa-10M-keatas (5).jpeg" alt="Apartemen">
                <div class="info">Apartemen</div>
            </div>
            <div class="photo-card" data-name="Rumah">
                <img src="lelang-jawa-10M-keatas (6).jpeg" alt="Rumah">
                <div class="info">Rumah</div>
            </div>
            <div class="photo-card" data-name="Rumah Usaha">
                <img src="lelang-jawa-10M-keatas (7).jpeg" alt="Rumah Usaha">
                <div class="info">Rumah Usaha</div>

                <div class="info">Rumah</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</html>
